[build]
  command = "pnpm install && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Security headers applied to all responses
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Force HTTPS for 1 year (enabled in production, Netlify auto-HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy
    # - script-src: self + GA4 (loaded after consent) + unsafe-inline for Astro hydration
    # - style-src: self + unsafe-inline for Astro scoped CSS
    # - img-src: self + data URIs + GA4 pixel
    # - connect-src: self + GA4 reporting endpoints
    # - font-src: self (Inter is self-hosted per ADR-005)
    # - frame-ancestors: none (redundant with X-Frame-Options, belt-and-suspenders)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
