name: Lighthouse Audit

on:
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse CI Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse on Homepage
        run: |
          lighthouse https://automagic-dev.netlify.app \
            --output=json \
            --output-path=./lhr-home.json \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --only-categories=performance,accessibility,best-practices,seo \
            || true

      - name: Run Lighthouse on About
        run: |
          lighthouse https://automagic-dev.netlify.app/about \
            --output=json \
            --output-path=./lhr-about.json \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --only-categories=performance,accessibility,best-practices,seo \
            || true

      - name: Print Scores
        if: always()
        run: |
          echo "=== Lighthouse Scores ==="
          for f in lhr-*.json; do
            if [ -f "$f" ]; then
              python3 -c "
import json
data = json.load(open('$f'))
cats = data.get('categories', {})
url = data.get('finalUrl', data.get('requestedUrl', '$f'))
print('URL:', url)
print('Performance:', round((cats.get('performance', {}).get('score', 0) or 0) * 100))
print('Accessibility:', round((cats.get('accessibility', {}).get('score', 0) or 0) * 100))
print('Best Practices:', round((cats.get('best-practices', {}).get('score', 0) or 0) * 100))
print('SEO:', round((cats.get('seo', {}).get('score', 0) or 0) * 100))
print()
"
            fi
          done

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: lhr-*.json
          retention-days: 7
